apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: coffeeknife
  namespace: flux-system
spec:
  interval: 24h
  url: https://git.wrenspace.dev/api/packages/coffeeknife/helm
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: octoprint
  namespace: octoprint
  labels:
    app.kubernetes.io/name: octoprint
    app.kubernetes.io/part-of: 3d
spec:
  interval: 30m
  values:
    persistence:
      enabled: true
      storageClass: longhorn
    podSecurityContext:
      fsGroup: 1000
    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: cert-issuer
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        gethomepage.dev/enabled: "true"
        gethomepage.dev/name: OctoPrint
        gethomepage.dev/description: 3D printer web interface
        gethomepage.dev/group: Services
      tls:
        - hosts:
            - 3d.wrenspace.dev
          secretName: octoprint-tls
      hosts:
        - host: 3d.wrenspace.dev
          paths:
            - path: /
              pathType: Prefix
  chart:
    spec:
      chart: octoprint
      version: 0.1.2
      sourceRef:
        kind: HelmRepository
        name: coffeeknife
        namespace: flux-system
