resources:
  requests:
    cpu: 50m
    memory: 128Mi

ports:
  websecure:
    port: 8443
    expose:
      default: true
    exposedPort: 443
    protocol: TCP
    http:
      middlewares:
        - kube-system-hsts@kubernetescrd
      tls:
        enabled: true
    http3:
      enabled: true
      advertisedPort: 443
    forwardedHeaders:
      trustedIPs:
        - "10.0.0.0/8"
        - "192.168.0.0/16"
      insecure: false
  ldaps:
    port: 6360
    expose:
      default: true
    exposedPort: 636
    protocol: TCP
  mysql:
    port: 3306
    expose:
      default: true
    exposedPort: 3306
    protocol: TCP

api:
  dashboard: true

providers:
  kubernetesCRD:
    allowCrossNamespace: true

service:
  annotations:
    # Pin the MetalLB LoadBalancer IP so the front door can never move on a
    # Service recreate. .100 is the address traefik already holds from
    # default-pool (192.168.200.100-254); .102 is the API VIP.
    metallb.io/loadBalancerIPs: "192.168.200.100"
