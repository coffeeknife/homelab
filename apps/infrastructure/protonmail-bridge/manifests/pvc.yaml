apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: protonmail-bridge-data-nfs
  namespace: protonmail-bridge
  labels:
    app.kubernetes.io/name: protonmail-bridge
    app.kubernetes.io/part-of: infrastructure
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: vulcan-nfs
  resources:
    requests:
      storage: 1Gi
