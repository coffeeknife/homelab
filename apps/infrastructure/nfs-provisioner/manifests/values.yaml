nfs:
  # Stable host alias resolved via /etc/hosts on the k3s nodes (see
  # nixos/modules/common.nix networking.hosts). Moving the NFS backend later is
  # a one-line change there — no PV/manifest churn, since the kubelet re-resolves
  # this name at mount time.
  server: nas.internal
  path: /mnt/birdpool/k8s-nfs
  mountOptions:
    - noatime
    - nfsvers=4.1
    - hard
    - rsize=1048576
    - wsize=1048576
    - timeo=600
    - retrans=2

storageClass:
  create: false

# Pin to kube-vm. The provisioner mounts NFS at the host level via the
# `nas.internal` alias (see nixos/modules/common.nix), which currently only
# resolves on kube-vm — gallifrey's node config can't be redeployed until its
# boot partition is fixed. Keeping this infra singleton on the stable amd64
# node also avoids it floating onto the Pi. Revisit once gallifrey resolves
# nas.internal.
nodeSelector:
  kubernetes.io/hostname: kube-vm

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 64Mi
