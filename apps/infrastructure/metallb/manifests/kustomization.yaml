apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - priorityclass.yaml
  - helmrelease.yaml
  - ipaddresses.yaml
  - kubernetes-api-lb.yaml

configMapGenerator:
  - name: metallb-values
    namespace: metallb
    files:
      - values.yaml
    options:
      disableNameSuffixHash: true
