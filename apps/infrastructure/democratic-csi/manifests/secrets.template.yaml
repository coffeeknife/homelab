# DO NOT COMMIT THIS FILE WITH PLAINTEXT SECRETS
# This is a template showing the structure. Follow these steps:
#
# 1. On vulcan, set up csi-controller user (see plan for full steps)
# 2. Generate SSH key on dev machine:
#      ssh-keygen -t ed25519 -C "democratic-csi" -N "" -f /tmp/csi-key
# 3. Add public key to vulcan:
#      ssh root@192.168.1.69 "cat >> /home/csi-controller/.ssh/authorized_keys" < /tmp/csi-key.pub
# 4. Fill in the privateKey fields below with the contents of /tmp/csi-key
# 5. Seal EACH secret separately with kubeseal (must already be in the kubernetes context):
#      kubectl create namespace democratic-csi --dry-run=client -o yaml | kubectl apply -f -
#      cat democratic-csi-nfs-config.yaml | kubeseal --format yaml > nfs-config-sealed.yaml
#      cat democratic-csi-iscsi-config.yaml | kubeseal --format yaml > iscsi-config-sealed.yaml
# 6. Save the sealed outputs as nfs-config.yaml and iscsi-config.yaml in this directory
# 7. Add them to kustomization.yaml resources list
# 8. Delete this template file and the unsealed versions, commit

---
# Template for NFS driver config secret
# Save as democratic-csi-nfs-config.yaml, fill privateKey, then seal
apiVersion: v1
kind: Secret
metadata:
  name: democratic-csi-nfs-config
  namespace: democratic-csi
stringData:
  driver-config-file.yaml: |
    driver: zfs-generic-nfs
    sshConnection:
      host: 192.168.1.69
      port: 22
      username: csi-controller
      privateKey: |
        -----BEGIN OPENSSH PRIVATE KEY-----
        REPLACE_WITH_CONTENTS_OF_/tmp/csi-key
        -----END OPENSSH PRIVATE KEY-----
    zfs:
      datasetParentName: birdpool/k8s-nfs
      detachedSnapshotsDatasetParentName: birdpool/k8s-nfs-snapshots
      datasetEnableQuotas: true
      datasetEnableReservation: false
      datasetPermissionsMode: "0777"
      datasetPermissionsUser: 0
      datasetPermissionsGroup: 0
    nfs:
      shareStrategy: setDatasetProperties
      shareStrategySetDatasetProperties:
        properties:
          sharenfs: "on"
      shareHost: 192.168.1.69
---
# Template for iSCSI driver config secret
# Save as democratic-csi-iscsi-config.yaml, fill privateKey, then seal
apiVersion: v1
kind: Secret
metadata:
  name: democratic-csi-iscsi-config
  namespace: democratic-csi
stringData:
  driver-config-file.yaml: |
    driver: zfs-generic-iscsi
    sshConnection:
      host: 192.168.1.69
      port: 22
      username: csi-controller
      privateKey: |
        -----BEGIN OPENSSH PRIVATE KEY-----
        REPLACE_WITH_CONTENTS_OF_/tmp/csi-key
        -----END OPENSSH PRIVATE KEY-----
    zfs:
      datasetParentName: birdpool/k8s-iscsi
      detachedSnapshotsDatasetParentName: birdpool/k8s-iscsi-snapshots
      zvolEnableReservation: false
    iscsi:
      shareStrategy: targetCli
      shareStrategyTargetCli:
        basename: iqn.2026-03.dev.wrenspace:k8s
        tpg:
          attributes:
            authentication: 0
            generate_node_acls: 1
            cache_dynamic_acls: 1
            demo_mode_write_protect: 0
          auth:
            userid: ""
            password: ""
            mutual_userid: ""
            mutual_password: ""
        block:
          attributes:
            emulate_tpu: 0
      targetPortal: "192.168.1.69:3260"
      targetPortals: []
