apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  name: mariadb
  namespace: mariadb-sys
spec:
  rootPasswordSecretKeyRef:
    name: mariadb-secret
    key: password

  priorityClassName: high-priority

  replicas: 1

  port: 3306

  storage:
    size: 5Gi
    storageClassName: local-path

  # bootstrapFrom is consulted only when the MariaDB CR is freshly created
  # (no RestoredBackup status condition). Stays in for DR: if the CR is
  # ever deleted + reapplied (e.g. cluster rebuild from git), the operator
  # restores from the latest file in mariadb-daily's PVC.
  #
  # Using volume source rather than backupRef to dodge the operator's
  # Backup-status check, which can deadlock when a backup happens to be
  # mid-fire during the Restore creation. Volume source reads the latest
  # file in the PVC directly via targetRecoveryTime defaulting to "now".
  bootstrapFrom:
    volume:
      persistentVolumeClaim:
        claimName: mariadb-daily
        readOnly: true

  myCnf: |
    [mariadb]
    bind-address=*
    default_storage_engine=InnoDB
    binlog_format=row
    innodb_autoinc_lock_mode=2
    innodb_buffer_pool_size=800M
    max_allowed_packet=1G

  resources:
    requests:
      cpu: 50m
      memory: 512Mi
    limits:
      cpu: 300m
      memory: 1Gi

  metrics:
    enabled: true