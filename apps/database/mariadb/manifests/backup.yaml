apiVersion: k8s.mariadb.com/v1alpha1
kind: Backup
metadata:
  name: mariadb-daily
  namespace: mariadb-sys
  labels:
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/part-of: database
    app.kubernetes.io/component: backup
spec:
  mariaDbRef:
    name: mariadb
  # Daily at 04:17 America/Chicago (= 09:17 UTC in CDT, 10:17 UTC in CST).
  # Cron is UTC and doesn't shift with DST, so this lands at 03:17 Chicago
  # for half the year — close enough; both windows are quiet for the homelab.
  schedule:
    cron: "17 9 * * *"
    suspend: false
  maxRetention: 336h          # 14 days
  compression: gzip
  storage:
    persistentVolumeClaim:
      accessModes: [ReadWriteOnce]
      resources:
        requests:
          storage: 20Gi
      storageClassName: vulcan-nfs
