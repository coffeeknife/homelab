apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ollama
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/part-of: services
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
        app.kubernetes.io/name: ollama
    spec:
      nodeSelector:
        gpu: amd
      securityContext:
        supplementalGroups:
          - 44   # video
          - 110  # render
      containers:
        - name: ollama
          image: ollama/ollama:0.5.4-rocm
          securityContext:
            privileged: true
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_MODELS
              value: /root/.ollama/models
            - name: OLLAMA_KEEP_ALIVE
              value: "30m"
            # Polaris (gfx803) is not officially supported by current ROCm.
            # This override coaxes ROCm into treating it as a supported
            # gfx version. Inference may still fall back to CPU.
            - name: HSA_OVERRIDE_GFX_VERSION
              value: "8.0.3"
            - name: HSA_ENABLE_SDMA
              value: "0"
          ports:
            - name: http
              containerPort: 11434
          resources:
            requests:
              cpu: 200m
              memory: 2Gi
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
            - name: dri
              mountPath: /dev/dri
            - name: kfd
              mountPath: /dev/kfd
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
        - name: dri
          hostPath:
            path: /dev/dri
        - name: kfd
          hostPath:
            path: /dev/kfd
