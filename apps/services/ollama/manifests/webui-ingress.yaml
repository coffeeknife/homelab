apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: open-webui
  namespace: ollama
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/part-of: services
  annotations:
    cert-manager.io/cluster-issuer: cert-issuer
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: kube-system-forwardauth@kubernetescrd
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Open WebUI"
    gethomepage.dev/group: "Core"
    gethomepage.dev/icon: "ollama"
    gethomepage.dev/description: "Local LLM chat"
    gethomepage.dev/href: "https://chat.wrenspace.dev"
    gethomepage.dev/weight: "70"
spec:
  rules:
    - host: chat.wrenspace.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: open-webui
                port:
                  name: http
  tls:
    - hosts:
        - chat.wrenspace.dev
      secretName: open-webui-tls
