apiVersion: k8s.mariadb.com/v1alpha1
kind: Database
metadata:
  name: homeassistant-db
  namespace: hass
  labels:
    app.kubernetes.io/name: home-assistant
    app.kubernetes.io/part-of: services
spec:
  mariaDbRef:
    name: mariadb
    namespace: mariadb-sys
  characterSet: utf8mb4
  collate: utf8mb4_unicode_ci
---
apiVersion: k8s.mariadb.com/v1alpha1
kind: User
metadata:
  name: homeassistant
  namespace: hass
  labels:
    app.kubernetes.io/name: home-assistant
    app.kubernetes.io/part-of: services
spec:
  mariaDbRef:
    name: mariadb
    namespace: mariadb-sys
  passwordSecretKeyRef:
    name: mariadb-secret
    key: password
  maxUserConnections: 20
---
apiVersion: k8s.mariadb.com/v1alpha1
kind: Grant
metadata:
  name: homeassistant-perm
  namespace: hass
  labels:
    app.kubernetes.io/name: home-assistant
    app.kubernetes.io/part-of: services
spec:
  mariaDbRef:
    name: mariadb
    namespace: mariadb-sys
  privileges:
    - "ALL"
  database: "homeassistant-db"
  table: "*"
  username: homeassistant
