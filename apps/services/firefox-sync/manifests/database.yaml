apiVersion: k8s.mariadb.com/v1alpha1
kind: Database
metadata:
  name: firefox-sync-db
  namespace: firefox-sync
  labels:
    app.kubernetes.io/name: firefox-sync
    app.kubernetes.io/part-of: services
spec:
  mariaDbRef:
    name: mariadb
    namespace: mariadb-sys
  characterSet: utf8mb4
  collate: utf8mb4_bin
---
apiVersion: k8s.mariadb.com/v1alpha1
kind: User
metadata:
  name: firefox-sync
  namespace: firefox-sync
  labels:
    app.kubernetes.io/name: firefox-sync
    app.kubernetes.io/part-of: services
spec:
  mariaDbRef:
    name: mariadb
    namespace: mariadb-sys
  passwordSecretKeyRef:
    name: mariadb-secret
    key: password
  maxUserConnections: 20
---
apiVersion: k8s.mariadb.com/v1alpha1
kind: Grant
metadata:
  name: firefox-sync-perm
  namespace: firefox-sync
  labels:
    app.kubernetes.io/name: firefox-sync
    app.kubernetes.io/part-of: services
spec:
  mariaDbRef:
    name: mariadb
    namespace: mariadb-sys
  privileges:
    - "ALL"
  database: "firefox-sync-db"
  table: "*"
  username: firefox-sync
