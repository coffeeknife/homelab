resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 300m

env:
  TZ: America/Chicago
  # Disable Organizr's on-boot self-updater (git pull into the NFS config
  # volume). The updater wedges on a stale .git/index.lock + NFS latency and
  # blocks the s6 cont-init chain, so nginx never binds :80 before the startup
  # probe kills the container (chronic crashloop). "manual" makes 40-install
  # skip the git update entirely and serve the already-cloned source.
  branch: manual

# The image's one-time s6 cont-init (30-setup) does a recursive
# `chmod -R g+w /config/www` over ~5900 files on the NFS config volume, which
# can exceed the chart's default 150s startup budget (30 x 5s) on a cold cache
# and get the container killed mid-setup. Give it a wider startup window so the
# one-time setup can finish and nginx can bind :80.
probes:
  startup:
    spec:
      failureThreshold: 90

ingress:
  main:
    enabled: true
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: cert-issuer
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      gethomepage.dev/enabled: "true"
      gethomepage.dev/name: "Organizr"
      gethomepage.dev/group: "Services"
      gethomepage.dev/icon: "organizr"
      gethomepage.dev/description: "Media App Organizer"
    hosts:
      - host: arr.wrenspace.dev
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: organizr-tls
        hosts:
          - arr.wrenspace.dev

persistence:
  config:
    enabled: true
    existingClaim: organizr-config-nfs