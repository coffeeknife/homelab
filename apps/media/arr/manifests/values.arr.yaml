jellyfin:
  enabled: false
  persistence:
    media:
      enabled: false

sonarr:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
  livenessProbe:
    timeoutSeconds: 5
  startupProbe:
    timeoutSeconds: 5
  image:
    repository: lscr.io/linuxserver/sonarr
    tag: 4.0.19
  env:
    TZ: America/Chicago
    SONARR__AUTH__METHOD: External
    SONARR__AUTH__REQUIRED: Disabled
  ingress:
    enabled: true
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: cert-issuer
      traefik.ingress.kubernetes.io/router.middlewares: kube-system-forwardauth@kubernetescrd,arr-stack-arr-frames@kubernetescrd
      # homepage
      gethomepage.dev/enabled: "true"
      gethomepage.dev/group: "Arr"
      gethomepage.dev/name: "Sonarr"
      gethomepage.dev/app: sonarr
      gethomepage.dev/icon: sonarr
      gethomepage.dev/description: TV finder
    hosts:
      - host: son.arr.wrenspace.dev
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: sonarr-tls
        hosts:
          - son.arr.wrenspace.dev
  persistence:
    enabled: true
    existingClaim: arr-stack-sonarr-nfs
    additionalVolumes:
      - name: jellyfin-nfs-pvc
        nfs:
          server: nas.internal
          path: "/mnt/birdpool/jellyfin/media"
    additionalMounts:
      - mountPath: /data
        name: jellyfin-nfs-pvc

