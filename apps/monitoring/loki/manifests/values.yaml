# DISABLED 2026-07-06: Loki's chunk store was Garage S3 on vulcan (192.168.1.69:3900),
# which was retired when the birdpool pool migrated to amphoreus/OMV. Loki + promtail
# are disabled until a new object store (or filesystem backend) is chosen. To re-enable:
# flip both `enabled` flags back to true AND replace the dead S3 endpoint below.
loki:
  enabled: false
  persistence:
    enabled: true
    storageClassName: local-path
    size: 2Gi
  podSecurityContext:
    fsGroupChangePolicy: OnRootMismatch
  extraEnvFrom:
    - secretRef:
        name: loki-s3-credentials
  config:
    schema_config:
      configs:
        - from: 2020-10-24
          store: boltdb-shipper
          object_store: aws
          schema: v11
          index:
            prefix: index_
            period: 24h
    storage_config:
      boltdb_shipper:
        active_index_directory: /data/loki/boltdb-shipper-active
        cache_location: /data/loki/boltdb-shipper-cache
        cache_ttl: 24h
        shared_store: s3
      aws:
        # DEAD ENDPOINT — Garage S3 on vulcan is retired. Replace before re-enabling Loki.
        endpoint: http://REPLACE-ME:3900
        bucketnames: loki-chunks
        region: garage
        s3forcepathstyle: true
        insecure: true
    compactor:
      working_directory: /data/loki/boltdb-shipper-compactor
      shared_store: s3
    chunk_store_config:
      max_look_back_period: 720h
    table_manager:
      retention_deletes_enabled: true
      retention_period: 720h
    limits_config:
      retention_period: 720h

promtail:
  enabled: false
  config:
    clients:
      - url: http://loki:3100/loki/api/v1/push

grafana:
  enabled: false
