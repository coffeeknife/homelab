loki:
  enabled: true
  persistence:
    enabled: true
    storageClassName: local-path
    size: 2Gi
  podSecurityContext:
    fsGroupChangePolicy: OnRootMismatch
  extraEnvFrom:
    - secretRef:
        name: loki-s3-credentials
  config:
    schema_config:
      configs:
        - from: 2020-10-24
          store: boltdb-shipper
          object_store: aws
          schema: v11
          index:
            prefix: index_
            period: 24h
    storage_config:
      boltdb_shipper:
        active_index_directory: /data/loki/boltdb-shipper-active
        cache_location: /data/loki/boltdb-shipper-cache
        cache_ttl: 24h
        shared_store: s3
      aws:
        endpoint: http://192.168.1.69:3900
        bucketnames: loki-chunks
        region: garage
        s3forcepathstyle: true
        insecure: true
    compactor:
      working_directory: /data/loki/boltdb-shipper-compactor
      shared_store: s3
    chunk_store_config:
      max_look_back_period: 720h
    table_manager:
      retention_deletes_enabled: true
      retention_period: 720h
    limits_config:
      retention_period: 720h

promtail:
  enabled: true
  config:
    clients:
      - url: http://loki:3100/loki/api/v1/push

grafana:
  enabled: false
