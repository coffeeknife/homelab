apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ntfy-data
  namespace: notify
  labels:
    app.kubernetes.io/name: ntfy
    app.kubernetes.io/part-of: monitoring
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: vulcan-nfs-strict
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ntfy-config
  namespace: notify
  labels:
    app.kubernetes.io/name: ntfy
    app.kubernetes.io/part-of: monitoring
data:
  server.yml: |
    base-url: https://ntfy.wrenspace.dev
    listen-http: :80
    cache-file: /var/lib/ntfy/cache.db
    auth-file: /var/lib/ntfy/user.db
    auth-default-access: write-only
    behind-proxy: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy
  namespace: notify
  labels:
    app.kubernetes.io/name: ntfy
    app.kubernetes.io/part-of: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ntfy
  template:
    metadata:
      labels:
        app: ntfy
        app.kubernetes.io/name: ntfy
    spec:
      containers:
        - name: ntfy
          image: binwiederhier/ntfy:v2.22.0
          args: ["serve"]
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/ntfy
            - name: data
              mountPath: /var/lib/ntfy
      volumes:
        - name: config
          configMap:
            name: ntfy-config
        - name: data
          persistentVolumeClaim:
            claimName: ntfy-data
---
apiVersion: v1
kind: Service
metadata:
  name: ntfy
  namespace: notify
  labels:
    app.kubernetes.io/name: ntfy
    app.kubernetes.io/part-of: monitoring
spec:
  selector:
    app: ntfy
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ntfy
  namespace: notify
  labels:
    app.kubernetes.io/name: ntfy
    app.kubernetes.io/part-of: monitoring
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: cert-issuer
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "ntfy"
    gethomepage.dev/group: "Infrastructure"
    gethomepage.dev/icon: "ntfy"
    gethomepage.dev/description: "Push notifications"
    gethomepage.dev/href: "https://ntfy.wrenspace.dev"
    gethomepage.dev/weight: "35"
spec:
  tls:
    - hosts:
        - ntfy.wrenspace.dev
      secretName: ntfy-tls
  rules:
    - host: ntfy.wrenspace.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ntfy
                port:
                  number: 80
