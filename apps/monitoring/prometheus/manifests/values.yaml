prometheus:
  prometheusSpec:
    retention: 14d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
    resources:
      requests:
        cpu: 50m
        memory: 2Gi
      limits:
        cpu: 500m
        memory: 4Gi
    ruleSelector: {}  

grafana:
  enabled: false

alertmanager:
  enabled: true
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    secrets:
      - alertmanager-discord-webhook
  config:
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      receiver: 'discord'
    receivers:
      - name: 'null'
      - name: 'discord'
        discord_configs:
          - webhook_url_file: '/etc/alertmanager/secrets/alertmanager-discord-webhook/url'
            send_resolved: true

defaultRules:
  create: true
  rules:
    kubernetesApps: true

prometheus-node-exporter:
  enabled: true

kubeStateMetrics:
  enabled: true