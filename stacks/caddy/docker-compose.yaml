version: "3.7"
services:
  caddy:
    image: lucaslorentz/caddy-docker-proxy:ci-alpine
    ports:
      - 80:80
      - 443:443
    environment:
      - CADDY_INGRESS_NETWORKS=caddy
      - CADDY_ADMIN=2019
    networks:
      - caddy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - {{.data_path}}/caddy:/data
    restart: unless-stopped
    deploy:
      placement:
        constraints:
          - node.role==manager

networks:
  caddy:
    external: true
