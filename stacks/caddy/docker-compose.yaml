version: "3.7"
services:
  caddy:
    image: lucaslorentz/caddy-docker-proxy:ci-alpine
    ports:
      - 80:80
      - 443:443
    environment:
      - CADDY_INGRESS_NETWORKS=caddy
      - CADDY_ADMIN=2019
    networks:
      - caddy
    configs:
      - source: proxies
        target: /etc/caddy/Caddyfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${caddy_data}:/data
    restart: unless-stopped
    deploy:
      placement:
        constraints:
          - node.role==manager

configs:
  proxies:
    content: |
      ${pihole_domain} {
        reverse_proxy ${pihole_addr}
      }

networks:
  caddy:
    external: true
