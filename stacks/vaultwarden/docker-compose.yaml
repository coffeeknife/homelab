version: "3"
services:
  vaultwarden:
    networks:
      - caddy
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      - 'ADMIN_TOKEN=${vaultwarden_admin}'
    ports:
      - 8445:80
    volumes:
      - ${vaultwarden_data}:/data:rw
    deploy:
      labels:
        # ingress
        caddy: ${vaultwarden_domain}
        caddy.tls: internal
        caddy.reverse_proxy: "{{ upstreams 80 }}"
        # homepage
        homepage.group: ${vaultwarden_group}
        homepage.name: Vaultwarden
        homepage.icon: vaultwarden
        homepage.href: https://${vaultwarden_domain}
        homepage.description: Password manager that works with Bitwarden clients. 
      placement:
        constraints:
          - node.labels.gigabit==true

networks:
  caddy:
    external: true