version: "3.3"
services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    networks:
      - caddy
    volumes:
      - /mnt/birdpool/homepage:/app/config # Make sure your local config directory exists
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      labels:
        caddy: ${homepage_domain}
        caddy.reverse_proxy: "{{ upstreams 3000 }}"
        caddy.tls: internal
      placement:
        constraints:
          - node.role==manager

# homepage/reverse proxy entries for non-docker infrastructure
configs:
  pihole:
    external: false
    content: |
      ${pihole_domain} {
        tls internal
        handle / {
          redir https://${pihole_domain}/admin
        }
        handle {
          reverse_proxy ${pihole_addr}
        }
      }
    labels:
      caddy: ${pihole_domain}
      caddy.reverse_proxy: ${pihole_addr}
      homepage.description: Network adblock & local DNS
      homepage.group: ${pihole_group}
      homepage.href: https://${pihole_domain}/admin
      homepage.icon: pi-hole
      homepage.name: PiHole
      
networks:
  caddy:
    external: true
