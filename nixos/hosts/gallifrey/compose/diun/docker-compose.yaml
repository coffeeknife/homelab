services:
  diun:
    container_name: diun
    image: crazymax/diun:latest
    command: serve
    volumes:
      - "./data:/data"
      - "/var/run/docker.sock:/var/run/docker.sock"
    environment:
      - "TZ=America/Chicago"
      - "DIUN_WATCH_WORKERS=20"
      - "DIUN_WATCH_SCHEDULE=0 */6 * * *"
      - "DIUN_WATCH_JITTER=30s"
      - "DIUN_PROVIDERS_DOCKER=true"
      - "DIUN_NOTIF_DISCORD_WEBHOOKURLFILE=/data/webhook.txt"
      - "DIUN_NOTIF_DISCORD_MENTIONS=<@153966208968949760>"
    labels:
      - "diun.enable=true"
    restart: always
