---
- name: Create Jellyfin LXC on Proxmox host
  hosts: proxmox

  tasks:
    - name: Create Alpine LXC
      community.general.proxmox:
        vmid: 110
        hostname: jellyfin
        node: etheirys
        api_user: root@pam
        unprivileged: true
        api_password: "{{ lookup('ansible.builtin.env', 'API_PASSWORD') }}"
        api_host: "192.168.1.53"
        password: "{{ lookup('ansible.builtin.env', 'PASSWORD') }}"
        ostemplate: 'local:vztmpl/alpine-3.20-default_20240908_amd64.tar.xz'
        hookscript: local:snippets/alpine-install-openssh.sh
        cores: 4
        disk: "local-lvm:64"
        memory: 4096
        netif:
          net0: "name=eth0,gw=192.168.1.1,ip=192.168.1.211/24,bridge=vmbr0,firewall=1"

    - name: Start Jellyfin LXC
      community.general.proxmox:
        vmid: 110
        api_user: root@pam
        api_password: "{{ lookup('ansible.builtin.env', 'API_PASSWORD') }}"
        api_host: "192.168.1.53"
        state: started

    - name: Wait for Jellyfin LXC to start
      ansible.builtin.pause:
        minutes: 1

- name: Install Jellyfin
  hosts: jellyfin

  tasks:
    - name: Install Jellyfin packages
      ansible.builtin.package:
        name:
          - jellyfin
          - jellyfin-web
          - jellyfin-ffmpeg
        state: present
