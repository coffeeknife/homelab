---
- name: Create TrueNAS VM
  hosts: proxmox

  tasks:
    - name: Create TrueNAS VM
      community.general.proxmox_kvm:
        vmid: 101
        name: truenas
        node: etheirys
        api_user: root@pam
        api_password: "{{ lookup('ansible.builtin.env', 'API_PASSWORD') }}"
        api_host: "192.168.1.53"
        cores: 2
        memory: 8192
        localtime: true
        sata:
          sata0: 'local-lvm:16'
        ide:
          ide0: 'local:iso/TrueNAS-13.0-U6.2.iso,media=cdrom'
        boot: order=ide0;sata0
        state: present
        onboot: true
        ostype: l26
        hotplug: disk,network,usb
        proxmox_default_behavior: compatibility
        net:
          net0: 'virtio,bridge=vmbr1'
        ipconfig:
          ipconfig0: 'ip=192.168.1.202/24,gw=192.168.1.1'
