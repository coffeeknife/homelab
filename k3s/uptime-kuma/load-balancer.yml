apiVersion: v1
kind: Service
metadata:
  name: uptime-lb
  namespace: uptime-kuma
spec:
  selector:
    app: uptime-kuma
  ports:
    - port: 3001
      targetPort: 3001
  type: LoadBalancer
  loadBalancerIP: 192.168.1.204
---
apiVersion: v1
kind: Service
apiVersion: v1
metadata:
  name: uptime-int-svc
  namespace: uptime-kuma
spec:
  type: ClusterIP
  selector:
    app: uptime-kuma
  ports:
  - name: http
    port: 3001
    protocol: TCP
    targetPort: 3001