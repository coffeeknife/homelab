apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: uptime-ing-traefik
  namespace: uptime-kuma
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
  - host: "uptime.bird.nest"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: uptime-int-svc
            port:
              number: 3001