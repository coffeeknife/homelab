apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fasten-pvc-db
  namespace: fasten
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fasten-pvc-cache
  namespace: fasten
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs
  resources:
    requests:
      storage: 1Gi